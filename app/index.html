<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP Security Demo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 2.5rem;
        max-width: 520px;
        width: 90%;
        text-align: center;
      }
      .badge {
        display: inline-block;
        background: #0ea5e9;
        color: #fff;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.25rem 0.75rem;
        border-radius: 999px;
        margin-bottom: 1.25rem;
      }
      h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.5rem; }
      p  { color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
      .stack { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem; }
      .tag {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 0.3rem 0.75rem;
        font-size: 0.8rem;
        color: #7dd3fc;
      }
      .status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 0.8rem;
        color: #4ade80;
      }
      .dot {
        width: 8px; height: 8px;
        background: #4ade80;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="badge">DevSecOps Demo</span>
      <h1>MCP Security Pipeline</h1>
      <p>A single-page application demonstrating automated security scanning, AI-assisted triage, and continuous vulnerability management.</p>
      <div class="stack">
        <span class="tag">Semgrep SAST</span>
        <span class="tag">DefectDojo</span>
        <span class="tag">Claude AI</span>
        <span class="tag">Terraform</span>
        <span class="tag">AWS S3 + CloudFront</span>
        <span class="tag">GitHub Actions</span>
      </div>
      <div class="status">
        <div class="dot"></div>
        Deployed via CI/CD &mdash; Phase 1 live
      </div>
    </div>
  </body>
</html>
