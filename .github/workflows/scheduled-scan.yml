name: Scheduled Security Scan

# Runs every Monday and Thursday at 08:00 UTC
on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 4'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TARGET_URL: https://dc4u52ktze490.cloudfront.net

jobs:
  sonarcloud:
    name: SonarCloud full scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  checkov:
    name: Checkov IaC & misconfiguration scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: json
          output_file_path: reports/
          soft_fail: true
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: checkov-results-scheduled
          path: reports/results_json.json
          retention-days: 30
        continue-on-error: true

  zap-scan:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP baseline scan
        run: |
          mkdir -p ${{ github.workspace }}/zap-output
          chmod 777 ${{ github.workspace }}/zap-output
          docker pull ghcr.io/zaproxy/zaproxy:stable
          docker run --rm \
            -v ${{ github.workspace }}/zap-output:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t ${{ env.TARGET_URL }} \
            -J zap-report.json \
            -I || true
        continue-on-error: true

      - name: Check ZAP output
        run: ls -la ${{ github.workspace }}/zap-output/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: ${{ github.workspace }}/zap-output/zap-report.json
          retention-days: 30
        continue-on-error: true

  npm-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm audit --json > npm-audit.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: npm-audit-scheduled
          path: app/npm-audit.json
          retention-days: 30

  push-to-defectdojo:
    name: Push findings to DefectDojo
    runs-on: ubuntu-latest
    needs: [sonarcloud, checkov, zap-scan, npm-audit]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - uses: actions/download-artifact@v4
        with:
          name: zap-report
          path: reports/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: npm-audit-scheduled
          path: reports/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: checkov-results-scheduled
          path: reports/
        continue-on-error: true

      - name: List reports
        run: ls -la reports/ || true

      - name: Install dependencies
        run: pip install requests

      - name: Push to DefectDojo
        run: python agents/defectdojo_push.py
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          DEFECTDOJO_ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
          REPORTS_DIR: reports/
        continue-on-error: true
