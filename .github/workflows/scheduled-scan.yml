name: Scheduled Security Scan

# Runs every Monday and Thursday at 08:00 UTC
on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 4'
  workflow_dispatch: # allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TARGET_URL: https://dc4u52ktze490.cloudfront.net

jobs:
  sonarcloud:
    name: SonarCloud full scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  zap-scan:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP full scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: .zap/rules.tsv
          cmd_options: '-J zap-report.json'
        continue-on-error: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.json
          retention-days: 30

  npm-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm audit --json > npm-audit.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: npm-audit-scheduled
          path: app/npm-audit.json
          retention-days: 30

  push-to-defectdojo:
    name: Push findings to DefectDojo
    runs-on: ubuntu-latest
    needs: [sonarcloud, zap-scan, npm-audit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: zap-report
          path: reports/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: npm-audit-scheduled
          path: reports/
        continue-on-error: true

      - name: Push to DefectDojo
        run: python agents/defectdojo_push.py
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          DEFECTDOJO_ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
          REPORTS_DIR: reports/
        continue-on-error: true # DefectDojo added in Phase 2
