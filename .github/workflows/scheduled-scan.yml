name: Scheduled Security Scan

on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 4'
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Repository name to scan (optional)'
        required: false
        default: ''
      target_url:
        description: 'Target URL for DAST scan (optional, overrides default)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TARGET_URL: ${{ github.event.inputs.target_url || 'https://dc4u52ktze490.cloudfront.net' }}

jobs:
  sonarcloud:
    name: SonarCloud full scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  checkov:
    name: Checkov IaC & misconfiguration scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: json
          output_file_path: reports/
          soft_fail: true
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: checkov-results-scheduled
          path: reports/results_json.json
          retention-days: 30
        continue-on-error: true

  zap-scan:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ZAP baseline scan (XML output)
        run: |
          mkdir -p ${{ github.workspace }}/zap-output
          chmod 777 ${{ github.workspace }}/zap-output
          docker pull ghcr.io/zaproxy/zaproxy:stable
          docker run --rm \
            -v ${{ github.workspace }}/zap-output:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t ${{ env.TARGET_URL }} \
            -x zap-report.xml \
            -I || true
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: ${{ github.workspace }}/zap-output/zap-report.xml
          retention-days: 30
        continue-on-error: true

  npm-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run npm audit (v1 compatible format)
        run: |
          npm audit --json 2>/dev/null | node -e "
          const chunks = [];
          process.stdin.on('data', d => chunks.push(d));
          process.stdin.on('end', () => {
            try {
              const data = JSON.parse(Buffer.concat(chunks).toString());
              if (!data.auditReportVersion) {
                process.stdout.write(JSON.stringify(data));
              } else {
                const v1 = {
                  advisories: {},
                  metadata: {
                    vulnerabilities: data.metadata ? data.metadata.vulnerabilities : {},
                    dependencies: data.metadata ? data.metadata.dependencies : 0,
                    devDependencies: 0, optionalDependencies: 0,
                    totalDependencies: data.metadata ? data.metadata.dependencies : 0
                  }
                };
                let id = 1;
                if (data.vulnerabilities) {
                  for (const [name, vuln] of Object.entries(data.vulnerabilities)) {
                    for (const via of (vuln.via || [])) {
                      if (typeof via === 'object' && via.url) {
                        v1.advisories[id] = {
                          id, module_name: name, severity: vuln.severity || 'unknown',
                          title: via.title || name, url: via.url || '',
                          recommendation: 'Update ' + name,
                          findings: [{ version: vuln.range || 'unknown', paths: [name] }]
                        };
                        id++;
                      }
                    }
                  }
                }
                process.stdout.write(JSON.stringify(v1));
              }
            } catch(e) {
              process.stdout.write(JSON.stringify({advisories:{},metadata:{vulnerabilities:{},dependencies:0,devDependencies:0,optionalDependencies:0,totalDependencies:0}}));
            }
          });
          " > npm-audit.json || true
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: npm-audit-scheduled
          path: app/frontend/npm-audit.json
          retention-days: 30

  push-to-defectdojo:
    name: Push findings to DefectDojo
    runs-on: ubuntu-latest
    needs: [sonarcloud, checkov, zap-scan, npm-audit]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Create reports directory
        run: mkdir -p reports
      - uses: actions/download-artifact@v4
        with:
          name: zap-report
          path: reports/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: npm-audit-scheduled
          path: reports/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: checkov-results-scheduled
          path: reports/
        continue-on-error: true
      - name: Install dependencies
        run: pip install requests
      - name: Push to DefectDojo
        run: python agents/defectdojo_push.py
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          DEFECTDOJO_ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
          REPORTS_DIR: reports/
        continue-on-error: true

  ai-triage:
    name: AI triage (Claude)
    runs-on: ubuntu-latest
    needs: push-to-defectdojo
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests anthropic
      - name: Run AI triage agent
        run: python agents/context_triage_agent.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          DEFECTDOJO_ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MAX_FINDINGS: '20'
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: triage-summary
          path: reports/triage-summary.json
          retention-days: 30
        continue-on-error: true

  generate-report:
    name: Generate security report
    runs-on: ubuntu-latest
    needs: ai-triage
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Create reports directory
        run: mkdir -p reports
      - uses: actions/download-artifact@v4
        with:
          name: triage-summary
          path: reports/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: zap-report
          path: reports/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: npm-audit-scheduled
          path: reports/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: checkov-results-scheduled
          path: reports/
        continue-on-error: true
      - name: Install dependencies
        run: pip install requests
      - name: Generate AI security report
        run: python agents/report_generator.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPORTS_DIR: reports/
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/security-report.md
          retention-days: 90
