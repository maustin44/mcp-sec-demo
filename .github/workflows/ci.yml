name: CI — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonarcloud:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm install

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  checkov:
    name: Checkov IaC & misconfiguration scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: json
          output_file_path: reports/
          soft_fail: true
          skip_check: CKV_AWS_144,CKV_AWS_145
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: reports/results_json.json
          retention-days: 7
        continue-on-error: true

  npm-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Audit frontend dependencies
      - name: Install and audit frontend
        working-directory: app/frontend
        run: |
          npm install
          npm audit --json > npm-audit-frontend.json || true

      # Audit backend dependencies
      - name: Install and audit backend
        working-directory: app/backend
        run: |
          npm install
          npm audit --json > npm-audit-backend.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: npm-audit-frontend
          path: app/frontend/npm-audit-frontend.json
          retention-days: 7
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: npm-audit-backend
          path: app/backend/npm-audit-backend.json
          retention-days: 7
        continue-on-error: true

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  deploy-frontend:
    name: Build & Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: [sonarcloud, checkov, npm-audit, gitleaks]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm install

      - name: Build frontend
        working-directory: app/frontend
        run: npm run build
        env:
          # Point frontend at the backend API URL once backend is deployed
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3001' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy dist to S3
        run: |
          aws s3 sync app/frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html always no-cache so users get latest version
          aws s3 cp app/frontend/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
